<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Math Forest - Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-sky: #a5f3fc;
            --grass-land: #22c55e;
            --panel-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            margin: 0;
            background-color: #1a1a1a;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
            overflow: hidden;
        }

        #game-view {
            width: 1000px;
            height: 600px;
            background-color: var(--bg-sky);
            border: 10px solid #444;
            position: relative;
            image-rendering: pixelated;
            display: flex;
        }

        /* Sidebar Stats & Instructions */
        #sidebar {
            width: 280px;
            background: #333;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-right: 6px solid #222;
            z-index: 5;
            overflow-y: auto;
        }

        .stat-box { text-align: center; border-bottom: 2px solid #444; padding-bottom: 10px; }
        .stat-label { font-size: 8px; color: #aaa; margin-bottom: 8px; }
        .stat-value { font-size: 14px; color: #fbbf24; }
        #mode-label { color: #00FFFF; font-size: 9px; margin-top: 5px; }

        /* Instruction Section */
        .how-to-play {
            background: #222;
            padding: 15px;
            border-radius: 4px;
            border: 2px dashed #555;
        }
        .how-to-play h3 { font-size: 10px; color: #fbbf24; margin-top: 0; text-align: center; }
        .how-to-play ul { padding: 0; list-style: none; margin: 0; }
        .how-to-play li { font-size: 7px; line-height: 1.8; color: #ddd; margin-bottom: 8px; }
        .key { color: #00FFFF; font-weight: bold; }

        /* Main Area */
        #main-canvas { flex-grow: 1; position: relative; overflow: hidden; }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            text-align: center;
        }

        .mode-select { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .mode-btn { background: #444; color: white; border: 4px solid #666; padding: 10px; cursor: pointer; font-family: 'Press Start 2P'; font-size: 8px; }
        .mode-btn.active { background: #fbbf24; border-color: #b45309; color: #333; }

        /* Gameplay UI */
        #ui-layer {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        #timer-display { font-size: 14px; color: #333; background: #fff; padding: 5px 10px; border: 3px solid #333; }

        #quit-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ef4444;
            color: white;
            border: 3px solid #7f1d1d;
            padding: 5px 10px;
            font-family: 'Press Start 2P';
            font-size: 10px;
            cursor: pointer;
        }

        #math-card {
            background: var(--panel-bg);
            padding: 15px;
            border: 4px solid #333;
            text-align: center;
        }

        .shake { animation: shake 0.3s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }

        #progress-container { width: 250px; height: 20px; border: 4px solid #333; background: #fff; }
        #progress-bar { width: 0%; height: 100%; background: #22c55e; transition: width 0.3s ease; }

        input { width: 120px; font-family: 'Press Start 2P'; font-size: 20px; text-align: center; border: 4px solid #333; margin-top: 10px; outline: none; }

        /* Plant Styles */
        #tree-world { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); }
        .pixel-grid { display: grid; grid-template-columns: repeat(10, 15px); grid-template-rows: repeat(10, 15px); }
        .p { width: 15px; height: 15px; }
        .s { background: #5d4037; } 
        .l { background: #2e7d32; } 
        .f { background: var(--flower-color, #f06292); } 
        .n { background: transparent; }

        #grass { position: absolute; bottom: 0; width: 100%; height: 100px; background: var(--grass-land); border-top: 6px solid #1b5e20; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button.main-play { padding: 15px 25px; background: #fbbf24; border: 6px solid #b45309; font-family: 'Press Start 2P'; cursor: pointer; font-size: 12px; }
        button.alt-play { padding: 15px 25px; background: #444; border: 6px solid #222; color: white; font-family: 'Press Start 2P'; cursor: pointer; font-size: 12px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-view">
        <div id="sidebar">
            <div class="stat-box">
                <div style="font-size: 24px;">🌳</div>
                <div class="stat-label">TOTAL TREES</div>
                <div id="total-trees" class="stat-value">0</div>
            </div>
            <div class="stat-box">
                <div style="font-size: 24px;">🏆</div>
                <div class="stat-label">BEST TIME</div>
                <div id="mode-label">PLUS</div>
                <div id="best-time" class="stat-value">--s</div>
            </div>

            <div class="how-to-play">
                <h3>HOW TO PLAY</h3>
                <ul>
                    <li>1. Select a <span class="key">MATH MODE</span>.</li>
                    <li>2. Solve <span class="key">10 PROBLEMS</span>.</li>
                    <li>3. Type and press <span class="key">ENTER</span>.</li>
                    <li>4. Correct answers grow the tree!</li>
                    <li>5. <span style="color: #ef4444;">ERRORS</span> reduce progress!</li>
                </ul>
            </div>
        </div>

        <div id="main-canvas">
            <div id="menu" class="overlay">
                <h1 style="color: #fbbf24; font-size: 20px;">MATH FOREST</h1>
                <p style="font-size: 8px;">CHOOSE A MODE TO BEGIN</p>
                <div class="mode-select">
                    <button class="mode-btn active" onclick="setMode('plus', this)">PLUS (+)</button>
                    <button class="mode-btn" onclick="setMode('minus', this)">MINUS (-)</button>
                    <button class="mode-btn" onclick="setMode('times', this)">TIMES (×)</button>
                    <button class="mode-btn" onclick="setMode('divide', this)">DIVIDE (÷)</button>
                </div>
                <button class="main-play" onclick="startGame()">START RUN</button>
            </div>

            <div id="win-screen" class="overlay hidden">
                <h2 style="color: #22c55e;">BLOOMED!</h2>
                <p id="final-stats" style="font-size: 10px; line-height: 1.6;"></p>
                <div class="btn-group">
                    <button class="main-play" onclick="resetForNewTree()">AGAIN</button>
                    <button class="alt-play" onclick="goToMenu()">MENU</button>
                </div>
            </div>

            <div id="ui-layer" class="hidden">
                <button id="quit-btn" onclick="goToMenu()">X</button>
                <div id="timer-display">TIME: 0.0s</div>
                <div id="progress-container"><div id="progress-bar"></div></div>
                <div id="math-card">
                    <div id="question" style="font-size: 18px;">Ready?</div>
                    <input type="number" id="answer-input">
                </div>
            </div>

            <div id="tree-world" class="hidden"><div id="tree-sprite" class="pixel-grid"></div></div>
            <div id="grass"></div>
        </div>
    </div>

    <script>
        let score = 0;
        let currentAnswer = 0;
        let gameMode = 'plus';
        let startTime, timerInterval;
        const totalNeeded = 10;

        // Reset variables (Starts fresh every time the page loads)
        let totalTrees = 0;
        let bestTimes = {
            plus: null, minus: null, times: null, divide: null
        };

        function updateSidebar() {
            document.getElementById('total-trees').innerText = totalTrees;
            document.getElementById('mode-label').innerText = gameMode.toUpperCase();
            let time = bestTimes[gameMode];
            document.getElementById('best-time').innerText = time ? time.toFixed(1) + 's' : '--s';
        }
        updateSidebar();

        const maps = {
            seed: ['n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','s','s','n','n','n','n','n','n','n','n','s','s','n','n','n','n'],
            sprout: ['n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','n','l','n','n','n','n','n','n','n','l','n','s','n','l','n','n','n','n','n','n','n','s','n','n','n','n','n','n','n','n','n','s','n','n','n','n','n','n','n','n','n','s','n','n','n','n','n'],
            tree: ['n','n','f','f','f','f','n','n','n','n','n','f','f','f','f','f','f','n','n','n','n','f','f','f','f','f','f','n','n','n','n','n','f','f','f','f','n','n','n','n','n','n','n','s','s','n','n','n','n','n','n','n','l','s','s','l','n','n','n','n','n','n','n','s','s','n','n','n','n','n','n','n','n','s','s','n','n','n','n','n','n','n','n','s','s','n','n','n','n','n','n','n','n','s','s','n','n','n','n','n']
        };

        function setMode(mode, btn) {
            gameMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateSidebar();
        }

        function startGame() {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('win-screen').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            document.getElementById('tree-world').classList.remove('hidden');
            score = 0;
            updateUI();
            nextQuestion();
            
            startTime = Date.now();
            timerInterval = setInterval(() => {
                let elapsed = (Date.now() - startTime) / 1000;
                document.getElementById('timer-display').innerText = `TIME: ${elapsed.toFixed(1)}s`;
            }, 100);
        }

        function goToMenu() {
            clearInterval(timerInterval);
            document.getElementById('ui-layer').classList.add('hidden');
            document.getElementById('win-screen').classList.add('hidden');
            document.getElementById('tree-world').classList.add('hidden');
            document.getElementById('menu').classList.remove('hidden');
        }

        function renderTree(map) {
            const grid = document.getElementById('tree-sprite');
            grid.innerHTML = '';
            grid.style.setProperty('--flower-color', ['#ff006e', '#8338ec', '#3a86ff', '#ffbe0b'][Math.floor(Math.random()*4)]);
            map.forEach(p => {
                const d = document.createElement('div');
                d.className = 'p ' + p;
                grid.appendChild(d);
            });
        }

        function nextQuestion() {
            let n1, n2, symbol;
            if(gameMode === 'plus') { n1 = Math.floor(Math.random()*12); n2 = Math.floor(Math.random()*12); currentAnswer = n1 + n2; symbol = '+'; }
            else if(gameMode === 'minus') { n1 = Math.floor(Math.random()*15) + 5; n2 = Math.floor(Math.random()*n1); currentAnswer = n1 - n2; symbol = '-'; }
            else if(gameMode === 'times') { n1 = Math.floor(Math.random()*10); n2 = Math.floor(Math.random()*5); currentAnswer = n1 * n2; symbol = '×'; }
            else { n2 = Math.floor(Math.random()*5) + 1; currentAnswer = Math.floor(Math.random()*10); n1 = n2 * currentAnswer; symbol = '÷'; }
            
            document.getElementById('question').innerText = `${n1} ${symbol} ${n2} = ?`;
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').focus();
        }

        document.getElementById('answer-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const val = parseInt(e.target.value);
                if(val === currentAnswer) {
                    score++;
                    updateUI();
                    if(score >= totalNeeded) win();
                    else nextQuestion();
                } else {
                    score = Math.max(0, score - 1);
                    document.getElementById('math-card').classList.add('shake');
                    setTimeout(() => document.getElementById('math-card').classList.remove('shake'), 300);
                    updateUI();
                    e.target.value = '';
                }
            }
        });

        function updateUI() {
            document.getElementById('progress-bar').style.width = (score/totalNeeded)*100 + '%';
            if (score >= 8) renderTree(maps.tree);
            else if (score >= 4) renderTree(maps.sprout);
            else renderTree(maps.seed);
        }

        function win() {
            clearInterval(timerInterval);
            let finishTime = (Date.now() - startTime) / 1000;
            totalTrees++;
            
            let isNewBest = false;
            let prevBest = bestTimes[gameMode];
            
            if (!prevBest || finishTime < prevBest) {
                bestTimes[gameMode] = finishTime;
                isNewBest = true;
            }
            
            updateSidebar();

            document.getElementById('final-stats').innerHTML = 
                `<span style="color:#00FFFF">${gameMode.toUpperCase()} RUN</span><br>` +
                `TIME: ${finishTime.toFixed(1)}s<br>` + 
                (isNewBest ? `<span style="color:#fbbf24">NEW RECORD!</span>` : `BEST: ${prevBest.toFixed(1)}s`);

            document.getElementById('win-screen').classList.remove('hidden');
            document.getElementById('ui-layer').classList.add('hidden');
        }

        function resetForNewTree() {
            startGame();
        }
    </script>
</body>
</html>
